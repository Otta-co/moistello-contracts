[package]
name = "circle"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
soroban-sdk = { workspace = true }
soroban-token-sdk = { workspace = true }
common = { path = "../common" }
reputation-registry = { path = "../reputation-registry" }

[features]
testutils = ["soroban-sdk/testutils"]

[dev-dependencies]
serde_json = "1"
rand = "0.8"
